<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#05050f;--card:#0d0d1a;--surf:#12121f;--gold:#f5c518;--green:#00ff88;--blue:#00d4ff;--red:#ff4444;--txt:#fff;--muted:#a0a0b8;--dim:#5a5a7a;--bdr:#2a2a3e}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
#app{height:100dvh;max-width:480px;margin:0 auto;display:flex;flex-direction:column;position:relative;background:var(--bg)}
.screen{flex:1;overflow-y:auto;padding-bottom:80px}
h1,h2{font-family:'Barlow Condensed',sans-serif;font-weight:900;letter-spacing:1px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 20px;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;letter-spacing:1.5px;cursor:pointer;border:none;width:100%;transition:opacity .15s,transform .1s}
.btn:active{opacity:.8;transform:scale(.98)}
.btn-gold{background:linear-gradient(135deg,#f5c518,#c9a000);color:#000}
.btn-out{background:transparent;border:1.5px solid var(--gold);color:var(--gold)}
.btn-red{background:rgba(255,68,68,.1);border:1.5px solid #ff4444;color:#ff4444}
.btn-dim{background:transparent;color:var(--dim);border:1px solid var(--bdr)}
.inp{width:100%;padding:13px 16px;background:var(--surf);border:1px solid var(--bdr);border-radius:10px;color:var(--txt);font-size:15px;font-family:'Barlow',sans-serif;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--gold)}
.lbl{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;letter-spacing:2.5px;color:var(--gold);margin-bottom:8px;display:block}
.nav{position:absolute;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid #f5c51840;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,6px)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 7px;cursor:pointer;border:none;background:none;color:var(--dim);font-size:9px;font-weight:800;letter-spacing:1px;gap:3px;font-family:'Barlow Condensed',sans-serif}
.ni.on{color:var(--gold)}
.ni-ico{font-size:20px;line-height:1}
.bk{background:none;border:none;cursor:pointer;color:var(--gold);font-weight:800;font-size:13px;padding:8px 0;display:flex;align-items:center;gap:6px;font-family:'Barlow Condensed',sans-serif}
.sp{display:inline-block;width:26px;height:26px;border:3px solid #2a2a3e;border-top-color:#f5c518;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{from{opacity:0;transform:scale(.3) rotate(-10deg)}to{opacity:1;transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.up{animation:up .3s ease forwards}
.pop{animation:pop .5s cubic-bezier(.175,.885,.32,1.275) forwards}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--card)}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
#intro-ov{position:fixed;inset:0;z-index:9999;background:#000;display:flex;align-items:center;justify-content:center;transition:opacity .7s ease}
#intro-ov.gone{opacity:0;pointer-events:none}
#intro-ov video{width:100%;height:100%;object-fit:cover;display:block}
<style>
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
#intro-ov.gone{opacity:0;pointer-events:none;transition:opacity .7s ease}
</style>

<script>
const APP_VERSION_CODE = 3; // increment with each release
const APP_VERSION = 'v1.0.' + APP_VERSION_CODE;

(function(){
  var ov = document.getElementById('intro-ov');
  if(!ov) return;
  // Set version dynamically
  var vEl = document.getElementById('splash-version');
  if(vEl) vEl.textContent = APP_VERSION;
  // Check if already seen in this session
  if(sessionStorage.getItem('emb_intro')){
    ov.remove(); return;
  }
  function dismiss(){
    if(!ov || ov.classList.contains('gone')) return;
    ov.classList.add('gone');
    sessionStorage.setItem('emb_intro','1');
    setTimeout(function(){ if(ov) ov.remove(); }, 750);
  }
  // Dismiss after 2s
  setTimeout(dismiss, 2000);
  // Or on tap
  ov.addEventListener('click', dismiss);
})();

'use strict';
// ═══════ CONFIG & RAW REST API (no SDK) ═══════
const CFG_KEY = 'emb_sb_v1';
let _CFG = null; // {url, key}

function loadCfg() {
  try {
    if (location.hash && location.hash.length > 2) {
      const d = JSON.parse(atob(location.hash.slice(1)));
      if (d.url && d.key) { localStorage.setItem(CFG_KEY, JSON.stringify(d)); return d; }
    }
  } catch(e) {}
  try { return JSON.parse(localStorage.getItem(CFG_KEY)) || null; } catch { return null; }
}
function saveCfg(c) { localStorage.setItem(CFG_KEY, JSON.stringify(c)); }
function getShareLink(c) {
  // No credentials needed — they're hardcoded in the app
  return 'https://tinyurl.com/emabol';
}

// Pure REST DB layer — no SDK, no postMessage, no DataCloneError
function _errMsg(e) {
  if (!e) return 'Error desconocido';
  if (typeof e === 'string') return e;
  return e.message || e.details || e.hint || JSON.stringify(e);
}
function _plain(x) {
  if (x == null) return x;
  return JSON.parse(JSON.stringify(x));
}
function _h() {
  var k = _CFG.key;
  return {
    'Content-Type': 'application/json',
    'apikey': k,
    'Authorization': 'Bearer ' + k
  };
}
function _base() { return _CFG.url + '/rest/v1'; }
async function _req(method, path, body) {
  var opts = { method: method, headers: Object.assign({}, _h()) };
  if (method === 'POST' || method === 'PATCH') {
    opts.headers['Prefer'] = 'resolution=merge-duplicates,return=minimal';
  }
  if (body != null) opts.body = JSON.stringify(body);
  var res = await fetch(_base() + path, opts);
  var txt = await res.text();
  if (!res.ok) {
    var msg = 'HTTP ' + res.status;
    try { var j = JSON.parse(txt); msg = j.message || j.details || j.hint || msg; } catch(e) {}
    throw new Error(msg);
  }
  if (!txt) return null;
  try { return JSON.parse(txt); } catch(e) { return null; }
}
async function getAll(table) {
  var r = await _req('GET', '/' + table + '?select=*');
  return _plain(r) || [];
}
async function getOne(table, id) {
  var r = await _req('GET', '/' + table + '?select=*&id=eq.' + encodeURIComponent(id));
  var rows = _plain(r);
  return (rows && rows.length) ? rows[0] : null;
}
async function upsertRow(table, row) {
  await _req('POST', '/' + table, _plain(row));
}
async function delRow(table, id) {
  await _req('DELETE', '/' + table + '?id=eq.' + encodeURIComponent(id), null);
}
async function delWhere(table, col, val) {
  await _req('DELETE', '/' + table + '?' + col + '=eq.' + encodeURIComponent(val), null);
}

// ═══════ AUTH ═══════
let ME = null;
try { ME = JSON.parse(sessionStorage.getItem('emb_me')) || null; } catch(e) {}
async function loginAsync(u, p) {
  u = u.trim();
  if (!u) return {ok:false, msg:'Ingresá tu nombre'};
  // Admin check
  if (u === 'emabol' && p === 'emabol') {
    const m = {n:'emabol', admin:true, jid:null};
    ME = m; sessionStorage.setItem('emb_me', JSON.stringify(m)); return {ok:true};
  }
  // Player login: username = nombre + primera letra apellido, password = clave field
  function normalize(s) {
    return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
  }
  function loginKey(nombre) {
    const parts = normalize(nombre).split(/\s+/).filter(Boolean);
    if(parts.length === 0) return '';
    if(parts.length === 1) return parts[0];
    return parts[0] + parts[1][0];
  }
  let all = [];
  try {
    // Use select with timeout-safe small fetch
    const res = await _req('GET', '/jugadores?select=id,nombre,clave,convocado,pos&limit=200');
    all = Array.isArray(res) ? res : [];
  }
  catch(e) { return {ok:false, msg:'Error de conexión: ' + _errMsg(e)}; }
  if(!all.length) return {ok:false, msg:'No se pudo conectar. Intentá de nuevo.'};
  const uNorm = normalize(u);
  const found = all.find(j => loginKey(j.nombre) === uNorm)
             || all.find(j => normalize(j.nombre) === uNorm);
  if (!found) return {ok:false, msg:'Usuario no encontrado. Usá formato: nombre + primera letra del apellido (ej: gabrielc)'};
  // Check password
  if(found.clave && p !== found.clave) return {ok:false, msg:'Contraseña incorrecta.'};
  // Need full player data for session
  try {
    const full = await getOne('jugadores', found.id);

async function seedData() {
  // ── One-time structural clear (partidos+ranking) — only if never done in DB ──
  // We use a config flag in Supabase itself, not localStorage, so it's global
  try {
    const cleared = await _req('GET', '/config?id=eq.emb_cleared_v3&select=id').catch(()=>[]);
    if(!cleared || !cleared.length) {
      await _req('DELETE', '/ranking?id=neq.NONE').catch(()=>{});
      await _req('DELETE', '/partidos?id=neq.NONE').catch(()=>{});
      await upsertRow('config', {id:'emb_cleared_v3', valor:'1'});
    }
  } catch(e) { console.warn('clear check error', e.message); }

  // ── Torneos: upsert only if missing ──────────────────────────────────────
  try {
    const existingTs = await _req('GET', '/torneos?select=id').catch(()=>[]);
    const tids = (existingTs||[]).map(t=>t.id);
    if(!tids.includes('t1'))

}

window.doSetup=async function(){
  var rawUrl=document.getElementById('s-url').value.trim().replace(/\/$/,'');
  var key=document.getElementById('s-key').value.trim();
  if(!rawUrl||!key){sSetup('Completá los dos campos.');return;}
  // Normalize URL
  var url=rawUrl;
  if(!url.startsWith('http'))url='https://'+url;
  _CFG = {url, key};
  saveCfg({url, key});
  setContent(loading('Verificando conexión...'));
  try {
    var _tr = await _req('GET', '/torneos?select=id&limit=1');
    setContent(loading('Inicializando datos...'));
    await seedData();
    go('/login');
  } catch(e) {
    sSetup('No se pudo conectar: ' + e.message);
  }
};

function sLogin(){
  setContent(`<div style="min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;background:linear-gradient(180deg,#05050f,#0d0d1a,#05050f);position:relative;overflow:hidden">

window.doLogin=async function(){
  const u=document.getElementById('lu').value.trim();
  const p=(document.getElementById('lp')||{value:''}).value;
  const e=document.getElementById('le');
  const btn=document.querySelector('.btn-gold');
  if(btn){btn.textContent='...';btn.disabled=true;}
  const res=await loginAsync(u,p);
  if(res.ok){go('/home');}
  else{
    e.textContent=res.msg||'Error al ingresar';e.style.display='block';
    if(btn){btn.textContent='INGRESAR';btn.disabled=false;}
    const w=document.querySelector('#app>div');if(w){w.style.animation='shake .4s ease';setTimeout(()=>w.style.animation='',500);}
  }
};

// Autocomplete for player name
window._allPlayers=[];
async function loadPlayerNames(){
  if(window._allPlayers.length) return;
  try{ window._allPlayers=(await getAll('jugadores')).map(j=>j.nombre); }catch(e){}
}
window.onPlayerInput=function(val){
  loadPlayerNames();
  const box=document.getElementById('suggest-box');
  if(!box) return;
  if(!val||val.length<2){box.innerHTML='';box.style.display='none';return;}
  const matches=window._allPlayers.filter(n=>n.toLowerCase().includes(val.toLowerCase())).slice(0,5);
  if(!matches.length){box.innerHTML='';box.style.display='none';return;}
  box.innerHTML=matches.map(n=>`<div onclick="pickPlayer('${n.replace(/'/g,"\'")}')" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid #2a2a3e;font-size:13px;color:#fff;font-weight:700" onmouseover="this.style.background='#1a1a2e'" onmouseout="this.style.background='transparent'">${n}</div>`).join('');
  box.style.display='block';
};
window.pickPlayer=function(name){
  const inp=document.getElementById('lu');
  if(inp)inp.value=name;
  const box=document.getElementById('suggest-box');
  if(box){box.innerHTML='';box.style.display='none';}
};

async function sHome(){
  setContent(loading());
  const [js, ts, convs, cfgRows, partidos, allRk] = await Promise.all([
    getAll('jugadores').catch(()=>[]),
    getAll('torneos').catch(()=>[]),
    getAll('convocatorias').catch(()=>[]),
    getAll('config').catch(()=>[]),
    getAll('partidos').catch(()=>[]),
    getAll('ranking').catch(()=>[])
  ]);
  const novedadesRaw = (cfgRows.find(r=>r.id==='novedades')||{}).valor||'';
  const novedadesHtml = novedadesRaw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  const shareLink = getShareLink({url:_CFG.url, key:_CFG.key});

  function getNextConv(tid){
    return convs
      .filter(cv=>cv.tid===tid && diasHasta(cv.fecha)>=0 && cv.estado!=='finalizado')
      .sort((a,b)=>diasHasta(a.fecha)-diasHasta(b.fecha))[0]||null;
  }

  const matchCards = ts.map(t=>{
    const color = t.id==='t1'?'#00d4ff':'#c084fc';
    const bg    = t.id==='t1'?'linear-gradient(135deg,#001525 0%,#003050 100%)':'linear-gradient(135deg,#1a0030 0%,#2d004d 100%)';
    const conv  = getNextConv(t.id);
    const fecha = conv?conv.fecha:proximoPartido(t.id);
    const dias  = diasHasta(fecha);
    // Badge estado partido
    const myEstH = ME&&!ME.admin&&conv
      ? ((conv.convocados_estado||[]).find(x=>x.jid===ME.jid)?.estado||'no_convocado')
      : null;
    let badge='';

      badge=`<span style="background:#00ff8820;border:1px solid #00ff88;color:#00ff88;padding:4px 12px;border-radius:999px;font-size:10px;font-weight:900;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px">✓ CONFIRMADO</span>`;
    else if(dias===0)
      badge=`<span style="background:${color}25;border:1px solid ${color};color:${color};padding:4px 12px;border-radius:999px;font-size:10px;font-weight:900;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px">🔴 HOY</span>`;
    else if(dias<=3)
      badge=`<span style="background:${color}20;border:1px solid ${color};color:${color};padding:4px 12px;border-radius:999px;font-size:10px;font-weight:900;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px">🟢 EN ${dias} DÍA${dias!==1?'S':''}</span>`;
    else
      badge=`<span style="background:#1a1a2e;border:1px solid #3a3a5e;color:var(--dim);padding:4px 12px;border-radius:999px;font-size:10px;font-weight:800;font-family:'Barlow Condensed',sans-serif">📅 EN ${dias} DÍAS</span>`;

    // Mi estado en este partido
    let myStatus='';
    const inTeamHome = conv && ([...(conv.equipo_a||[]),...(conv.equipo_b||[])]).includes(ME?.jid);
    const isConfHome = conv?.estado==='confirmado';
    const convLabel = isConfHome && !inTeamHome ? 'CONVOCADO — SUPLENTE' : 'CONVOCADO';

      ${j.foto?`<img src="${j.foto}" style="width:100%;height:100%;object-fit:cover" alt=""/>`:`<span style="font-size:36px">⚽</span>`}
    </div>
    <h2 style="font-size:20px;font-family:'Barlow Condensed',sans-serif;margin-bottom:7px">${j.nombre}</h2>
    <div style="display:flex;gap:7px;justify-content:center;align-items:center;flex-wrap:wrap">
      <span style="padding:3px 11px;border-radius:999px;background:${pc}22;border:1px solid ${pc};font-size:12px;color:${pc};font-weight:800;font-family:'Barlow Condensed',sans-serif">${posLabel}</span>
      ${rank?`<span style="padding:3px 11px;border-radius:999px;background:#f5c51818;border:1px solid #f5c518;font-size:12px;color:#f5c518;font-weight:800;font-family:'Barlow Condensed',sans-serif">#${rank} · ${pts} pts</span>`:''}

        <button onclick="cambiarClave('${j.id}','${j.nombre.replace(/'/g,"\\'")}')" style="background:#f5c51820;border:1px solid #f5c518;color:#f5c518;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:11px;font-weight:700;font-family:'Barlow Condensed',sans-serif">Cambiar</button>

window.cambiarClave=async function(jid, nombre){
  const nueva = prompt('Nueva contraseña para ' + nombre + ':', '');
  if(nueva===null) return; // cancelled
  if(!nueva.trim()){ alert('La contraseña no puede estar vacía.'); return; }
  try{
    const j = await getOne('jugadores', jid);
    if(!j){ alert('Jugador no encontrado.'); return; }
    await upsertRow('jugadores', {...j, clave: nueva.trim()});
    go('/player', {id: jid});
  } catch(e){ alert('Error: '+_errMsg(e)); }
};

window.delPl=async function(id,nombre){
  if(!confirm(`¿Eliminar a ${nombre}?`))return;
  setContent(loading('Eliminando...'));
  await delRow('jugadores',id);
  await delWhere('ranking','jid',id);
  go('/players');
};

// Helper: parse fecha string 'DD/MM/YYYY' → Date
function parseFecha(f) {
  if(!f) return null;
  const p = f.split('/');
  return new Date(+p[2], +p[1]-1, +p[0]);
}
function fmtFechaCorta(f) {
  if(!f) return '';
  const [dd,mm,aa] = f.split('/').map(Number);
  const d = new Date(aa,mm-1,dd);
  const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  return `${dias[d.getDay()]} ${dd} de ${meses[mm-1]}`;
}
function fmtFecha(d) {
  if(!d) return '';
  return d.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
}
function diasHasta(fecha) {
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const d = parseFecha(fecha); if(!d) return 999;
  d.setHours(0,0,0,0);
  return Math.round((d-hoy)/(1000*60*60*24));
}

// Get next partido for each torneo
function proximoPartido(tid) {
  // t1=miércoles(3), t2=sábados(6)
  const diaSemana = tid==='t1' ? 3 : 6;
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const d = new Date(hoy);
  let diff = diaSemana - d.getDay();
  if(diff <= 0) diff += 7;
  d.setDate(d.getDate() + diff);
  return d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}).replace(/\//g,'/');
}

// Main screen: shows both torneos next match
function fixtureFor(t){const ds=t.id==='t1'?3:6;const[dI,mI,aI]=t.ini.split('/').map(Number);const[dF,mF,aF]=t.fin.split('/').map(Number);const end=new Date(aF,mF-1,dF);const d=new Date(aI,mI-1,dI);let df=ds-d.getDay();if(df<0)df+=7;d.setDate(d.getDate()+df);const r=[];while(d<=end){r.push(d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}).replace(/\//g,'/'));d.setDate(d.getDate()+7);}return r;}

    if(figJid===ME.jid){ alert('No podés votarte a vos mismo.'); return; }
    // Verify voter was in a team
    const allConvs = await getAll('convocatorias').catch(()=>[]);
    const cvV = allConvs.find(cv=>cv.tid===p.tid&&cv.fecha===p.fecha);
    const jugV = [...new Set([...(cvV?.equipo_a||[]),...(cvV?.equipo_b||[])])];
    if(!jugV.includes(ME.jid)){ alert('Solo pueden votar los que jugaron el partido.'); return; }
    await upsertRow('partidos', {...p, votos_figura:[...votos,{voter:ME.jid,fig:figJid}]});
    sHome();
  } catch(e){ alert('Error: '+_errMsg(e)); }
};

window.votarFigura = async function(pid, figJid) {
  if(!ME?.jid) return;
  try {
    const partidos = await getAll('partidos');
    const p = partidos.find(x=>x.id===pid); if(!p||!p.votacion_abierta) return;
    // Check not already voted
    const votos = p.votos_figura||[];
    if(votos.find(v=>v.voter===ME.jid)){ alert('Ya votaste en este partido.'); return; }
    // Check not voting self
    if(figJid===ME.jid){ alert('No podés votarte a vos mismo.'); return; }
    // Check voter was in this match
    if(!(p.conv||[]).includes(ME.jid)){ alert('Solo los que jugaron pueden votar.'); return; }
    const newVotos = [...votos, {voter:ME.jid, fig:figJid}];
    await upsertRow('partidos', {...p, votos_figura:newVotos});
    // Show confirmation
    await sProximos();
  } catch(e){ alert('Error: '+_errMsg(e)); }
};

window.toggleConvocado = async function(cvid, accion) {
  if(!ME?.jid) return;
  try {
    // Always fetch fresh from DB to avoid overwriting concurrent changes
    const fresh = await getOne('convocatorias', cvid);
    if(!fresh) return;
    const est = accion==='convocar' ? 'convocado' : 'no_convocado';
    const estado = JSON.parse(JSON.stringify(fresh.convocados_estado || []));
    const idx = estado.findIndex(x=>x.jid===ME.jid);
    if(idx>=0) {
      estado[idx].estado = est;
      if(est==='convocado') estado[idx].ts = estado[idx].ts || Date.now();
      if(est==='no_convocado') estado[idx].ts = null;
    } else {
      estado.push({jid:ME.jid, estado:est, ts: est==='convocado'?Date.now():null});
    }
    // Save only convocados_estado — atomic patch on the full row
    await upsertRow('convocatorias', {...fresh, convocados_estado: estado});
    await sProximos();
  } catch(e) {
    console.error('toggleConvocado error:', e);
    alert('No se pudo guardar. Intentá de nuevo.');
  }
};


async function sConvocatoria(p) {
  setContent(loading('Cargando...'));
  const [ts, allJs, convs, partidos] = await Promise.all([
    getAll('torneos').catch(()=>[]),
    getAll('jugadores').catch(()=>[]),
    getAll('convocatorias').catch(()=>[]),
    getAll('partidos').catch(()=>[])
  ]);
  // Partidos pending figura vote or open voting
  const partidosSinFig = partidos.filter(p =>
    !p.fig &&
    (p.votacion_abierta || (p.votos_figura||[]).length > 0 ||
     (Array.isArray(p.conv) && p.conv.length > 0) ||
     (Array.isArray(p.equipo_a) && p.equipo_a.length > 0))
  );
  const t = ts.find(x=>x.id===(p.tid||'t1')) || ts[0];
  if(!t){ setContent('<div class="screen" style="padding:20px;color:var(--red)">No se encontró el torneo.</div>'); return; }

  const fecha = p.fecha || proximoPartido(t.id);
  // Try exact match first, then fallback to any future conv for this torneo
  let conv = convs.find(cv=>cv.tid===t.id && cv.fecha===fecha)
    || convs.filter(cv=>cv.tid===t.id && diasHasta(cv.fecha)>=0)
             .sort((a,b)=>diasHasta(a.fecha)-diasHasta(b.fecha))[0]
    || null;

  if(!conv) {
    // Auto-seed from last partido
    const fixture = fixtureFor(t);
    const fidx = fixture.indexOf(fecha);
    let autoConv = [];
    if(fidx>0) {
      const prevFechas = fixture.slice(0,fidx);
      const lastP = partidos.filter(p2=>p2.tid===t.id&&prevFechas.includes(p2.fecha)).sort((a,b)=>b.fecha.localeCompare(a.fecha))[0];
      if(lastP?.conv) autoConv = Array.isArray(lastP.conv)?lastP.conv:[];
    }
    conv = {
      id:uid(), tid:t.id, fecha, hora:t.id==='t2'?'15:00':'20:00',
      estado:'en_proceso',
      equipo_a:[], equipo_b:[],
      equipo_a_nombre:'AJAX', equipo_b_nombre:'ROMA',
      quieren_jugar:[],
      convocados_estado: [], // players self-convoke
      camisetero_ciclo_idx: 0,
      created_at: Date.now()
    };
    await upsertRow('convocatorias', conv);
  }

  // Migrate legacy estado values
  if(conv.estado==='borrador'||conv.estado==='abierto'||conv.estado==='confirmado'&&false) conv.estado='en_proceso';
  if(conv.estado==='confirmado') conv.estado='confirmado';
  if(!conv.convocados_estado) {
    const todos=[...new Set([...(conv.equipo_a||[]),...(conv.equipo_b||[])])];
    conv.convocados_estado=todos.map(jid=>({jid,estado:'convocado'}));
  }
  // (migration removed — toggleConvocado now always sets ts on self-convoke)
  if(!conv.equipo_a_nombre) conv.equipo_a_nombre='AJAX';
  if(!conv.equipo_b_nombre) conv.equipo_b_nombre='ROMA';

  CV = JSON.parse(JSON.stringify(conv));
  CV._js = allJs;
  CV._t = t;
  CV._ro = p.ro||false;

  // CV is already fresh from getAll() above — no extra fetch needed.
  // Concurrent player changes are handled by merge in saveConv.
  renderConv();
}

// ── Shared conv helpers ──────────────────────────────────────────────────────
async function saveConv() {
  // If admin: fetch latest from DB first, then apply our CV changes on top
  // so player self-convocations made concurrently are not overwritten
  let mergedEstado = CV.convocados_estado || [];
  if (ME && ME.admin) {
    try {
      const fresh = await getOne('convocatorias', CV.id);
      if (fresh && fresh.convocados_estado) {
        const dbEstado = fresh.convocados_estado;
        // Start from CV state (admin's intentional changes)
        mergedEstado = [...(CV.convocados_estado || [])];
        // Add any DB entries not in CV (player self-convocations)
        dbEstado.forEach(dbEntry => {
          const cvIdx = mergedEstado.findIndex(x => x.jid === dbEntry.jid);
          if (cvIdx < 0) {
            // Player exists in DB but not in CV — add them
            mergedEstado.push(dbEntry);
          }
          // If already in CV, keep CV version (admin's explicit change wins)
        });
      }
    } catch(e) { console.warn('saveConv merge error:', e.message); }
  }
  return upsertRow('convocatorias', {
    id: CV.id, tid: CV.tid, fecha: CV.fecha, hora: CV.hora,
    estado: CV.estado,
    equipo_a: CV.equipo_a, equipo_b: CV.equipo_b,
    equipo_a_nombre: CV.equipo_a_nombre, equipo_b_nombre: CV.equipo_b_nombre,
    quieren_jugar: CV.quieren_jugar,
    convocados_estado: mergedEstado,
    camisetero_ciclo_idx: CV.camisetero_ciclo_idx ?? null,
    created_at: CV.created_at || Date.now()
  });
}
function getEstado(jid) {
  const e = (CV.convocados_estado||[]).find(x=>x.jid===jid);
  return e ? e.estado : 'no_convocado';
}
function setEstado(jid, estado) {
  CV.convocados_estado = CV.convocados_estado || [];
  const idx = CV.convocados_estado.findIndex(x=>x.jid===jid);
  if(idx>=0) {
    CV.convocados_estado[idx].estado = estado;
    if(estado==='convocado' && !CV.convocados_estado[idx].ts) {
      CV.convocados_estado[idx].ts = Date.now();
    }
  } else {
    CV.convocados_estado.push({jid, estado, ts: estado==='convocado'?Date.now():null});
  }
  if(estado !== 'convocado') {
    CV.equipo_a = (CV.equipo_a||[]).filter(x=>x!==jid);
    CV.equipo_b = (CV.equipo_b||[]).filter(x=>x!==jid);
  }
}

    const tm = equipo==='a' ? teamA : teamB;
    const av = j.foto ? `<img src="${j.foto}" style="width:100%;height:100%;object-fit:cover"/>` : j.nombre[0];
    const removeBtn = `<button onclick="quitarDeEquipo('${jid}')" style="background:#ff444420;border:1px solid #ff444440;color:#ff4444;border-radius:6px;padding:2px 7px;cursor:pointer;font-size:9px;font-weight:700;flex-shrink:0">✕</button>`;
    return `<div
      draggable="true"
      ondragstart="dragStart(event,'${jid}','${equipo}')"
      ondragend="dragEnd(event)"
      data-jid="${jid}" data-eq="${equipo}"
      style="display:flex;align-items:center;gap:7px;padding:6px 8px;background:${tm.color}12;border:1px solid ${tm.color}35;border-radius:8px;margin-bottom:4px;cursor:grab;touch-action:none;user-select:none">
      <div style="width:26px;height:26px;border-radius:50%;background:${tm.color}25;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:${tm.color};font-family:'Barlow Condensed',sans-serif;overflow:hidden;flex-shrink:0">${av}</div>
      <p style="flex:1;font-size:12px;font-weight:700;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${j.nombre}</p>
      ${removeBtn}
    </div>`;
  }

  // Drop zone header for each team
  function dropZoneHeader(equipo, color, nombre, count) {
    return `<div
      ondragover="dragOver(event)"
      ondragleave="dragLeave(event)"
      ondrop="dropOnTeam(event,'${equipo}')"
      data-dropzone="${equipo}"
      style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;color:${color};margin-bottom:6px;padding:6px 8px;border-radius:8px;border:2px dashed transparent;transition:all .15s;cursor:default">
      ${nombre} <span style="font-size:10px;font-weight:700;color:var(--dim)">${count}/8</span>
    </div>`;
  }

  const teamsHtml = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      <div>
        ${dropZoneHeader('a', teamA.color, ta, ea.length)}
        <div
          ondragover="dragOver(event)"
          ondragleave="dragLeave(event)"
          ondrop="dropOnTeam(event,'a')"
          data-dropzone="a"
          id="drop-zone-a"
          style="min-height:40px;border-radius:8px;border:2px dashed transparent;transition:all .15s">
          ${ea.map(jid=>chipAdmin(jid,'a')).join('')}
          ${ea.length<8 ? `<div style="border:1px dashed ${teamA.color}30;border-radius:8px;padding:6px;text-align:center;color:var(--dim);font-size:10px">${8-ea.length} lugar${8-ea.length>1?'es':''} libre${8-ea.length>1?'s':''}</div>` : ''}
        </div>
      </div>
      <div>
        ${dropZoneHeader('b', teamB.color, tb, eb.length)}
        <div
          ondragover="dragOver(event)"
          ondragleave="dragLeave(event)"
          ondrop="dropOnTeam(event,'b')"
          data-dropzone="b"
          id="drop-zone-b"
          style="min-height:40px;border-radius:8px;border:2px dashed transparent;transition:all .15s">
          ${eb.map(jid=>chipAdmin(jid,'b')).join('')}
          ${eb.length<8 ? `<div style="border:1px dashed ${teamB.color}30;border-radius:8px;padding:6px;text-align:center;color:var(--dim);font-size:10px">${8-eb.length} lugar${8-eb.length>1?'es':''} libre${8-eb.length>1?'s':''}</div>` : ''}
        </div>
      </div>
    </div>`;

  // ── JUGADORES LIST ────────────────────────────────────────────────────
  // Sort: in-team first (green), then convocado (blue), then no_convocado, then suspendido
  const ORDER = {convocado:0, no_convocado:1, suspendido:2};
  // convocados sorted by arrival time (ts), others alphabetically
  function getTs(jid){ const e=(CV.convocados_estado||[]).find(x=>x.jid===jid); return e?.ts||Infinity; }
  const allSorted = [...js].sort((a,b) => {
    const aInT = ea.includes(a.id)||eb.includes(a.id);
    const bInT = ea.includes(b.id)||eb.includes(b.id);
    if(aInT !== bInT) return aInT ? -1 : 1;
    const aEst = getEst(a.id), bEst = getEst(b.id);
    const od = (ORDER[aEst]??1) - (ORDER[bEst]??1);
    if(od !== 0) return od;
    // Within convocados: sort by arrival time
    if(aEst==='convocado' && bEst==='convocado') return getTs(a.id)-getTs(b.id);
    return a.nombre.localeCompare(b.nombre,'es');
  });

  const totalConvocados = (CV.convocados_estado||[]).filter(x=>x.estado==='convocado').length;

  function adminRow(j) {
    const est = getEst(j.id);
    const pc = PC[j.pos]||'#00d4ff';
    const inA = ea.includes(j.id), inB = eb.includes(j.id), inTeam = inA||inB;
    const posLabel = j.pos==='ARQ' ? 'Arquero' : 'Jugador';

    const teamTag = inA
      ? `<span style="background:${teamA.color}30;border:1px solid ${teamA.color};color:${teamA.color};padding:1px 6px;border-radius:5px;font-size:9px;font-weight:800">${ta}</span>`
      : inB
      ? `<span style="background:${teamB.color}30;border:1px solid ${teamB.color};color:${teamB.color};padding:1px 6px;border-radius:5px;font-size:9px;font-weight:800">${tb}</span>`
      : '';

    // Controls
    let controls = '';
    if (est === 'suspendido') {
      controls = `<button onclick="adminSetEstado('${j.id}','no_convocado')" style="padding:4px 9px;border-radius:6px;cursor:pointer;background:#2a2a3e;border:1px solid #3a3a5e;color:var(--dim);font-size:9px;font-weight:700">Levantar</button>`;
    } else if (est === 'no_convocado') {
      controls = `
        <button onclick="adminSetEstado('${j.id}','convocado')" style="padding:4px 9px;border-radius:6px;cursor:pointer;background:#00d4ff20;border:1px solid #00d4ff;color:#00d4ff;font-size:9px;font-weight:700">✋ Convocar</button>
        <button onclick="adminSetEstado('${j.id}','suspendido')" style="padding:4px 9px;border-radius:6px;cursor:pointer;background:#ff444420;border:1px solid #ff4444;color:#ff4444;font-size:9px;font-weight:700">🚫</button>`;
    } else if (est === 'convocado') {
      if (!isConfirmado) {
        controls = `
          ${!inTeam&&ea.length<8 ? `<button onclick="asignarEquipo('${j.id}','a')" style="padding:4px 9px;border-radius:6px;cursor:pointer;background:${teamA.color}30;border:1px solid ${teamA.color};color:${teamA.color};font-size:9px;font-weight:700">${ta.slice(0,3)}</button>` : ''}
          ${!inTeam&&eb.length<8 ? `<button onclick="asignarEquipo('${j.id}','b')" style="padding:4px 9px;border-radius:6px;cursor:pointer;background:${teamB.color}30;border:1px solid ${teamB.color};color:${teamB.color};font-size:9px;font-weight:700">${tb.slice(0,3)}</button>` : ''}
          ${inTeam ? `<button onclick="quitarDeEquipo('${j.id}')" style="padding:4px 9px;border-radius:6px;cursor:pointer;background:#ff444420;border:1px solid #ff4444;color:#ff4444;font-size:9px;font-weight:700">✕ Equipo</button>` : ''}
          <button onclick="adminSetEstado('${j.id}','no_convocado')" style="padding:4px 9px;border-radius:6px;cursor:pointer;background:#ff880020;border:1px solid #ff8800;color:#ff8800;font-size:9px;font-weight:700">✗ No va</button>
          <button onclick="adminSetEstado('${j.id}','suspendido')" style="padding:4px 9px;border-radius:6px;cursor:pointer;background:#ff444420;border:1px solid #ff4444;color:#ff4444;font-size:9px;font-weight:700">🚫</button>`;
      } else {
        // confirmed but not in team yet → can swap in
        if (!inTeam) {
          controls = `
            ${ea.length<8 ? `<button onclick="asignarEquipo('${j.id}','a')" style="padding:4px 9px;border-radius:6px;cursor:pointer;background:${teamA.color}30;border:1px solid ${teamA.color};color:${teamA.color};font-size:9px;font-weight:700">${ta.slice(0,3)}</button>` : ''}
            ${eb.length<8 ? `<button onclick="asignarEquipo('${j.id}','b')" style="padding:4px 9px;border-radius:6px;cursor:pointer;background:${teamB.color}30;border:1px solid ${teamB.color};color:${teamB.color};font-size:9px;font-weight:700">${tb.slice(0,3)}</button>` : ''}`;
        }
      }
    }

    const rowBg = inTeam
      ? 'linear-gradient(135deg,#001a10,#002a18)'
      : est==='convocado' ? 'linear-gradient(135deg,#001520,#002035)'
      : est==='suspendido' ? 'linear-gradient(135deg,#1a0000,#2a0000)'
      : 'var(--surf)';
    const rowBorder = inTeam ? '#00ff8830' : est==='convocado' ? '#00d4ff30' : est==='suspendido' ? '#ff444430' : '#1a1a2a';

    return `<div style="display:flex;align-items:center;gap:8px;padding:9px 10px;background:${rowBg};border:1px solid ${rowBorder};border-radius:9px;margin-bottom:5px">
      <div style="width:28px;height:28px;border-radius:50%;background:${pc}25;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:${pc};font-family:'Barlow Condensed',sans-serif;overflow:hidden;flex-shrink:0">${j.foto?`<img src="${j.foto}" style="width:100%;height:100%;object-fit:cover"/>`:j.nombre[0]}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
          <p style="font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px">${j.nombre}</p>
          ${teamTag}
        </div>
        <div style="display:flex;align-items:center;gap:5px;margin-top:2px">
          ${estadoBadge(est)}
          <span style="font-size:9px;color:${pc}">${posLabel}</span>
        </div>
      </div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;max-width:160px">${controls}</div>
    </div>`;
  }

  const canConfirm = !isConfirmado && ea.length===8 && eb.length===8;
  const convocarTodosBtn = !isConfirmado
    ? `<button onclick="convocarATodos()" style="width:100%;padding:11px;border-radius:9px;cursor:pointer;border:1px solid #00d4ff;background:#00d4ff15;color:#00d4ff;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;letter-spacing:1px;margin-bottom:8px">✋ CONVOCAR A TODOS</button>`
    : `<button onclick="revertirPartido()" style="width:100%;padding:11px;border-radius:9px;cursor:pointer;border:1px solid #f5c518;background:#f5c51815;color:#f5c518;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;margin-bottom:8px">🔄 VOLVER A CONVOCATORIA EN PROCESO</button>`;
  const confirmBtn = canConfirm
    ? `<button onclick="confirmarConvocatoria()" style="width:100%;padding:14px;border-radius:10px;cursor:pointer;border:none;background:linear-gradient(135deg,#00ff88,#00cc66);color:#000;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:15px;letter-spacing:2px;margin-top:4px">✅ CONFIRMAR PARTIDO</button>`
    : `<p style="text-align:center;color:var(--dim);font-size:12px;margin-top:8px">Necesitás 8 en cada equipo · ${ea.length}/8 — ${eb.length}/8</p>`;

  const horaInput = !isConfirmado ? `<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
    <label class="lbl" style="margin:0;white-space:nowrap">HORA:</label>
    <input class="inp" value="${CV.hora||'20:00'}" placeholder="20:00" style="max-width:100px" oninput="CV.hora=this.value"/>
  </div>` : '';

  setContent(`<div class="screen up" style="padding:14px 15px 18px">
    ${fixBanner}
    ${headerHtml}
    ${horaInput}
    ${teamPickerHtml}
    ${teamsHtml}
    <div style="margin-bottom:6px">
      <p class="lbl" style="margin-bottom:8px">JUGADORES · ${totalConvocados} convocados · ${ea.length+eb.length}/16 en equipos</p>
      ${allSorted.map(adminRow).join('')}
    </div>
    ${convocarTodosBtn}
    ${confirmBtn}
  </div>`);
}


// ── Admin actions ────────────────────────────────────────────────────────────
window.convocarATodos = async function() {
  const js = CV._js || [];
  CV.convocados_estado = CV.convocados_estado || [];
  js.forEach(j => {
    const idx = CV.convocados_estado.findIndex(x=>x.jid===j.id);
    const est = idx>=0 ? CV.convocados_estado[idx].estado : 'no_convocado';
    // Don't change suspended players
    if(est === 'suspendido') return;
    if(idx>=0) CV.convocados_estado[idx].estado = 'convocado';
    else CV.convocados_estado.push({jid:j.id, estado:'convocado'});
  });
  await saveConv();
  renderConv();
};

window.adminSetEstado = async function(jid, estado) {
  setEstado(jid, estado);
  await saveConv();
  renderConv();
};
window.asignarEquipo = async function(jid, equipo) {
  const ea=CV.equipo_a||[], eb=CV.equipo_b||[];
  if(equipo==='a'&&ea.length>=8){alert('Equipo A ya tiene 8');return;}
  if(equipo==='b'&&eb.length>=8){alert('Equipo B ya tiene 8');return;}
  if(equipo==='a') CV.equipo_a=[...ea,jid]; else CV.equipo_b=[...eb,jid];
  await saveConv(); renderConv();
};
// ── Drag & drop swap ────────────────────────────────────────────────────────
var _dragJid = null, _dragFrom = null;

window.dragStart = function(ev, jid, equipo) {
  _dragJid = jid; _dragFrom = equipo;
  ev.dataTransfer.effectAllowed = 'move';
  ev.dataTransfer.setData('text/plain', jid);
  setTimeout(function(){ if(ev.target) ev.target.style.opacity='0.4'; }, 0);
  // Highlight drop zones
  ['a','b'].forEach(function(z){
    var el = document.getElementById('drop-zone-'+z);
    if(el && z !== equipo) {
      el.style.border = '2px dashed #f5c518';
      el.style.background = '#f5c51808';
    }
  });
  // Also highlight headers
  document.querySelectorAll('[data-dropzone]').forEach(function(el){
    if(el.dataset.dropzone !== equipo) {
      el.style.border = '2px dashed #f5c51860';
    }
  });
};

window.dragEnd = function(ev) {
  if(ev.target) ev.target.style.opacity = '1';
  ['a','b'].forEach(function(z){
    var el = document.getElementById('drop-zone-'+z);
    if(el){ el.style.border='2px dashed transparent'; el.style.background=''; }
  });
  document.querySelectorAll('[data-dropzone]').forEach(function(el){
    el.style.border = '2px dashed transparent';
    el.style.background = '';
  });
};

window.dragOver = function(ev) {
  ev.preventDefault();
  ev.dataTransfer.dropEffect = 'move';
  var zone = ev.currentTarget;
  if(zone && zone.dataset.dropzone !== _dragFrom) {
    zone.style.border = '2px dashed #f5c518';
    zone.style.background = '#f5c51812';
  }
};

window.dragLeave = function(ev) {
  var zone = ev.currentTarget;
  if(zone) { zone.style.border='2px dashed transparent'; zone.style.background=''; }
};

window.dropOnTeam = async function(ev, targetEquipo) {
  ev.preventDefault();
  var zone = ev.currentTarget;
  if(zone){ zone.style.border='2px dashed transparent'; zone.style.background=''; }
  if(!_dragJid || _dragFrom === targetEquipo) return;
  var jid = _dragJid, fromEq = _dragFrom;
  _dragJid = null; _dragFrom = null;
  // Swap: move jid from fromEq to targetEquipo
  // If target team is full, swap with a player from target team? No — just move if space.
  // If target is full but source had the player: swap positions
  var ea = CV.equipo_a||[], eb = CV.equipo_b||[];
  var fromList = fromEq==='a' ? ea : eb;
  var toList   = fromEq==='a' ? eb : ea;
  if(!fromList.includes(jid)) return;
  var newFrom = fromList.filter(x=>x!==jid);
  var newTo   = [...toList, jid];
  if(fromEq==='a'){ CV.equipo_a=newFrom; CV.equipo_b=newTo; }
  else            { CV.equipo_b=newFrom; CV.equipo_a=newTo; }
  await saveConv();
  renderConv();
};

window.quitarDeEquipo = async function(jid) {
  CV.equipo_a=(CV.equipo_a||[]).filter(x=>x!==jid);
  CV.equipo_b=(CV.equipo_b||[]).filter(x=>x!==jid);
  await saveConv(); renderConv();
};
window.setTeam = async function(slot, nombre) {
  if(slot==='a'&&nombre===CV.equipo_b_nombre){alert('Ese equipo ya está en el otro lado.');return;}
  if(slot==='b'&&nombre===CV.equipo_a_nombre){alert('Ese equipo ya está en el otro lado.');return;}
  if(slot==='a') CV.equipo_a_nombre=nombre; else CV.equipo_b_nombre=nombre;
  await saveConv(); renderConv();
};
window.confirmarConvocatoria = async function() {
  if(!confirm('¿Confirmar el partido? Los jugadores verán los equipos.')) return;
  CV.estado='confirmado';
  await saveConv();
  setContent(`<div style="height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:linear-gradient(180deg,#05050f,#001a0a)">
    <span style="font-size:56px">✅</span>
    <h2 style="font-family:'Barlow Condensed',sans-serif;font-size:24px;color:#00ff88;letter-spacing:2px">¡PARTIDO CONFIRMADO!</h2>
    <p style="color:var(--dim)">Los jugadores ya pueden ver los equipos.</p>
  </div>`);
  setTimeout(()=>go('/match'),2000);
};
window.revertirPartido = async function() {
  if(CV.estado==='finalizado'){ alert('Este partido ya fue finalizado y no puede volver a convocatoria.'); return; }
  if(!confirm('¿Volver a "Convocatoria en proceso"? Los jugadores podrán modificar su estado nuevamente.')) return;
  CV.estado='en_proceso';
  await saveConv(); renderConv();
};
window.limpiarAutoSeed = async function() {
  if(!CV?.id) return;
  try {
    // Fetch absolute fresh from DB
    const fresh = await getOne('convocatorias', CV.id);
    if(!fresh) return;
    let changed = false;
    fresh.convocados_estado = (fresh.convocados_estado||[]).map(x=>{
      if(x.estado==='convocado' && !x.ts){ changed=true; return {...x, estado:'no_convocado'}; }
      return x;
    });
    if(changed) {
      await upsertRow('convocatorias', fresh);
      CV = JSON.parse(JSON.stringify(fresh));
      renderConv();
    }
  } catch(e){ alert('Error: '+_errMsg(e)); }
};

window.avanzarCamisetero = async function(dir) {
  const lastIdx = typeof CV.camisetero_ciclo_idx==='number' ? CV.camisetero_ciclo_idx : -1;
  const len = CICLO_CAMISETAS.length;
  if(dir==='prev') {
    CV.camisetero_ciclo_idx = (lastIdx - 1 + len) % len;
  } else {
    CV.camisetero_ciclo_idx = (lastIdx + 1) % len;
  }
  await saveConv(); renderConv();
};
window.playerSetEstado = async function(nuevoEstado) {
  if(!ME?.jid || !CV?.id) return;
  try {
    const fresh = await getOne('convocatorias', CV.id);
    if(!fresh) return;
    const estado = JSON.parse(JSON.stringify(fresh.convocados_estado || []));
    const idx = estado.findIndex(x=>x.jid===ME.jid);
    if(idx>=0) {
      estado[idx].estado = nuevoEstado;
      if(nuevoEstado==='convocado') estado[idx].ts = estado[idx].ts || Date.now();
      if(nuevoEstado==='no_convocado') estado[idx].ts = null;
    } else {
      estado.push({jid:ME.jid, estado:nuevoEstado, ts: nuevoEstado==='convocado'?Date.now():null});
    }
    await upsertRow('convocatorias', {...fresh, convocados_estado: estado});
    CV = {...fresh, convocados_estado: estado};
    renderConv();
  } catch(e) { alert('Error: '+_errMsg(e)); }
};
window.playerPedirEntrar = async function() {
  if(!ME?.jid) return;
  setEstado(ME.jid,'convocado');
  await saveConv(); renderConv();
};
window.toggleAsistencia = async function(cvid, accion) {
  if(accion==='quiero') await window.playerPedirEntrar();
  else if(accion==='desconvocar') await window.playerSetEstado('no_convocado');
};

async function sHistorial(){
  setContent(loading('Cargando historial...'));
  const [partidos, js, ts] = await Promise.all([getAll('partidos'), getAll('jugadores'), getAll('torneos')]);
  const jMap={}; js.forEach(j=>jMap[j.id]=j);
  const tMap={}; ts.forEach(t=>tMap[t.id]=t);

  // Ordenar por fecha desc
  const sorted = [...partidos].sort((a,b)=>b.fecha.localeCompare(a.fecha));

  const rows = sorted.length===0
    ? `<div style="text-align:center;padding:48px 0;color:var(--dim)">
         <p style="font-size:40px;margin-bottom:10px">📋</p>
         <p style="font-size:14px">No hay partidos cargados aún.</p>
       </div>`
    : sorted.map(p=>{
        const t = tMap[p.tid];
        const color = p.tid==='t1'?'#00d4ff':'#c084fc';
        const conv = Array.isArray(p.conv)?p.conv:[];
        const fig  = p.fig ? jMap[p.fig] : null;
        const ganLabel = p.gan==='EMPATE'
          ? `<span style="color:#00ff88;font-weight:900;font-family:'Barlow Condensed',sans-serif;font-size:14px">EMPATE</span>`
          : `<span style="color:#f5c518;font-weight:900;font-family:'Barlow Condensed',sans-serif;font-size:14px">GANÓ EQUIPO ${p.gan}</span>`;
        const figHtml = fig
          ? `<p style="font-size:10px;color:#f5c518;margin-top:2px;font-family:'Barlow Condensed',sans-serif">⭐ FIGURA: ${fig.nombre}</p>`
          : '';
        const playerChips = conv.map(jid=>{
          const j=jMap[jid]; if(!j) return '';
          const pc = PC[j.pos]||'#888';
          return `<span style="padding:2px 7px;border-radius:999px;background:${pc}15;border:1px solid ${pc}40;font-size:9px;color:${pc};font-family:'Barlow Condensed',sans-serif;font-weight:700">${j.nombre}</span>`;
        }).join('');

        return `<div style="background:var(--card);border:1px solid ${color}30;border-radius:12px;padding:14px;margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">

window.recalcularRanking = async function() {
  if(!confirm('¿Recalcular el ranking completo desde cero? Esto borrará los puntos actuales y los recalculará en base a los partidos guardados.')) return;
  setContent(loading('Recalculando...'));
  try {
    const [partidos, convs, js] = await Promise.all([
      getAll('partidos'), getAll('convocatorias'), getAll('jugadores')
    ]);
    // Delete all ranking rows
    await _req('DELETE', '/ranking?id=neq.NONE');
    // Rebuild from each partido
    const newRk = {}; // key: jid+'|'+tid → {pts,g,c,f}
    for(const p of partidos) {
      // Best source: equipo_a/b stored in partido itself
      // Fallback: equipo_a/b from convocatoria
      // Last resort: p.conv (may include non-players in old data)
      const pEa = Array.isArray(p.equipo_a) ? p.equipo_a : [];
      const pEb = Array.isArray(p.equipo_b) ? p.equipo_b : [];
      const cv = convs.find(cv=>cv.tid===p.tid&&cv.fecha===p.fecha);
      const cvEa = cv?.equipo_a||[], cvEb = cv?.equipo_b||[];
      const ea = pEa.length ? pEa : cvEa;
      const eb = pEb.length ? pEb : cvEb;
      const jugaron = [...new Set([...ea,...eb])];
      const gan = p.gan; // 'a','b','EMPATE'
      const ganadores = gan==='a'?ea:gan==='b'?eb:[];
      const isEmpate = gan==='EMPATE';
      for(const jid of jugaron) {
        const key = jid+'|'+p.tid;
        if(!newRk[key]) newRk[key]={jid,tid:p.tid,pts:0,g:0,c:0,f:0};
        newRk[key].pts += 1;                              // jugó +1
        newRk[key].c  += 1;
        if(ganadores.includes(jid)){ newRk[key].pts+=3; newRk[key].g+=1; } // ganó +3
        if(isEmpate) newRk[key].pts += 1;                // empate +1
      }
      // figura
      if(p.fig) {
        const key = p.fig+'|'+p.tid;
        if(!newRk[key]) newRk[key]={jid:p.fig,tid:p.tid,pts:0,g:0,c:0,f:0};
        newRk[key].pts += 2;
        newRk[key].f  += 1;
      }
    }
    // Save all ranking rows
    for(const [key, row] of Object.entries(newRk)) {
      await upsertRow('ranking', {id:uid(), ...row});
    }
    alert('✅ Ranking recalculado correctamente.');
    sMatch();
  } catch(e) {
    alert('Error: '+_errMsg(e));
    sMatch();
  }
};

window.abrirVotacion = async function(pid) {
  try {
    const [partidos, convs] = await Promise.all([getAll('partidos'), getAll('convocatorias')]);
    const p = partidos.find(x=>x.id===pid); if(!p) return;
    // Mark convocatoria as finalizado if not already
    const cv = convs.find(cv=>cv.tid===p.tid&&cv.fecha===p.fecha);
    if(cv && cv.estado!=='finalizado') {
      await upsertRow('convocatorias', {...cv, estado:'finalizado'});
    }
    await upsertRow('partidos', {...p, votacion_abierta:true});
    sMatch();
  } catch(e){ alert('Error: '+_errMsg(e)); }
};

window.cerrarVotacion = async function(pid) {
  try {
    const [partidos, ranking, convs] = await Promise.all([getAll('partidos'), getAll('ranking').catch(()=>[]), getAll('convocatorias').catch(()=>[])]);
    const p = partidos.find(x=>x.id===pid); if(!p) return;
    // Ensure convocatoria is finalizado
    const cvC = convs.find(cv=>cv.tid===p.tid&&cv.fecha===p.fecha);
    if(cvC && cvC.estado!=='finalizado') {
      await upsertRow('convocatorias', {...cvC, estado:'finalizado'});
    }
    const votos = p.votos_figura||[];
    // Tally
    const tally = {};
    votos.forEach(v=>{ tally[v.fig]=(tally[v.fig]||0)+1; });
    const entries = Object.entries(tally).sort((a,b)=>b[1]-a[1]);
    if(entries.length===0){ alert('No hay votos todavía.'); return; }
    const maxVotos = entries[0][1];
    const ganadores = entries.filter(([,v])=>v===maxVotos).map(([jid])=>jid);
    // 2 pts split among tied winners (floor if odd)
    const ptsPorFig = Math.floor(2/ganadores.length) || 1;
    // Update ranking
    for(const jid of ganadores){
      const existing = ranking.find(r=>r.jid===jid&&r.tid===p.tid);
      await upsertRow('ranking', {
        id: existing?.id||uid(), jid, tid:p.tid,
        pts: (existing?.pts||0)+ptsPorFig,
        g: existing?.g||0, c: existing?.c||0,
        f: (existing?.f||0)+1
      });
    }
    // Save fig (first winner) and close voting
    await upsertRow('partidos', {...p, votacion_abierta:false, fig: ganadores[0]});
    sMatch();
  } catch(e){ alert('Error: '+_errMsg(e)); }
};

window.guardarResultado = async function(cvid) {
  const res = window._matchResults[cvid]||{};
  if(!res.gan){ alert('Elegí el resultado primero.'); return; }
  // Always fetch fresh from DB to get accurate equipo_a/equipo_b
  let cv = window._matchConvs[cvid];
  try {
    const freshConvs = await getAll('convocatorias');
    const fresh = freshConvs.find(x=>x.id===cvid);
    if(fresh) cv = fresh;
  } catch(e) {}
  if(!cv){ alert('No se encontró la convocatoria.'); return; }
  const jMap = window._matchJs||{};
  const ea = cv.equipo_a||[], eb = cv.equipo_b||[];
  // Only players who were IN a team get points
  const jugaron = [...new Set([...ea, ...eb])];
  const ganadores = res.gan==='a' ? ea : res.gan==='b' ? eb : [];

  // Ranking: jugó +1, ganó +3, empate +1. Figura (+2) goes after voting.
  const updates = {};
  jugaron.forEach(jid=>{ updates[jid] = 1; });                          // +1 por jugar
  ganadores.forEach(jid=>{ updates[jid] = (updates[jid]||0) + 3; });   // +3 por ganar
  if(res.gan==='empate') jugaron.forEach(jid=>{ updates[jid] = (updates[jid]||0) + 1; }); // +1 extra por empate

  try {
    const pid = uid();
    // Mark convocatoria as 'finalizado' so it disappears from upcoming
    await upsertRow('convocatorias', {...cv, estado:'finalizado'});
    await upsertRow('partidos', {
      id: pid,
      tid: cv.tid,
      fecha: cv.fecha,
      conv: jugaron,
      equipo_a: ea,
      equipo_b: eb,
      gan: res.gan==='empate' ? 'EMPATE' : res.gan,
      fig: null,
      votos_figura: [],
      votacion_abierta: false
    });

    // Update ranking (sin figura todavía)
    const existingRk = await getAll('ranking').catch(()=>[]);
    for(const [jid, pts] of Object.entries(updates)){
      const existing = existingRk.find(r=>r.jid===jid&&r.tid===cv.tid);
      const isGanador = ganadores.includes(jid);
      await upsertRow('ranking', {
        id: existing?.id || uid(),
        jid, tid: cv.tid,
        pts: (existing?.pts||0) + pts,
        g:   (existing?.g||0) + (isGanador?1:0),
        c:   (existing?.c||0) + 1,  // partidos jugados
        f:   (existing?.f||0)
      });
    }

    var btn = document.querySelector(`[onclick="guardarResultado('${cvid}')"]`);
    if(btn){ btn.textContent='✅ GUARDADO'; btn.style.background='linear-gradient(135deg,#00ff88,#00cc66)'; btn.disabled=true; }
    delete window._matchConvs[cvid];
    setTimeout(()=>sMatch(), 1500);
  } catch(e) {
    alert('Error al guardar: ' + _errMsg(e));
  }
};

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    const sw=`
const CACHE='emabol-v1';
self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['/'])));self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));self.clients.claim();});
self.addEventListener('fetch',e=>{
  if(e.request.method!=='GET'||e.request.url.includes('supabase.co'))return;
  e.respondWith(fetch(e.request).then(r=>{caches.open(CACHE).then(c=>c.put(e.request,r.clone()));return r;}).catch(()=>caches.match(e.request)));
});`;
    const url=URL.createObjectURL(new Blob([sw],{type:'application/javascript'}));
    navigator.serviceWorker.register(url).catch(()=>{});
  });
}

      +'</div>';
  } else {
    d.innerHTML = '<div style="background:linear-gradient(135deg,#1a1a2e,#12122a);border:2px solid #f5c518;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 24px #000000c0;min-width:260px">'
      +'<span style="font-size:26px;flex-shrink:0">📲</span>'
      +'<div style="flex:1"><p style="font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:14px;color:#f5c518;letter-spacing:1px;margin-bottom:3px">INSTALAR EMABOL</p>'
      +'<p style="font-size:11px;color:#a0a0b8">Agregá la app a tu pantalla de inicio</p></div>'
      +'<div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">'
      +'<button onclick="window.doInstallPWA()" style="background:linear-gradient(135deg,#f5c518,#c9a000);border:none;border-radius:8px;padding:7px 14px;cursor:pointer;font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:12px;color:#000;letter-spacing:1px">INSTALAR</button>'
      +'<button onclick="window.dismissPWA()" style="background:transparent;border:1px solid #3a3a5e;border-radius:8px;padding:5px 14px;cursor:pointer;font-size:11px;color:#5a5a7a">Ahora no</button>'
      +'</div>'
      +'</div>';
  }

  document.body.appendChild(d);
};

window.doInstallPWA = async function(){
  if(_pwaPrompt){
    _pwaPrompt.prompt();
    await _pwaPrompt.userChoice;
    _pwaPrompt = null;
    var b = document.getElementById('pwa-btn'); if(b) b.remove();
  } else {
    var b = document.getElementById('pwa-btn');
    if(b) b.innerHTML = '<div style="background:#1a1a2e;border:2px solid #f5c518;border-radius:14px;padding:14px 16px;box-shadow:0 4px 24px #000000c0;max-width:300px">'
      +'<p style="font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:14px;color:#f5c518;letter-spacing:1px;margin-bottom:8px">📲 CÓMO INSTALAR</p>'
      +'<p style="font-size:12px;color:#a0a0b8;line-height:1.8;margin-bottom:10px">En Chrome tocá el menú <strong style="color:#fff">&#8942;</strong> (arriba a la derecha) y elegí <strong style="color:#fff">Instalar app</strong> o <strong style="color:#fff">Agregar a pantalla de inicio</strong>.</p>'
      +'<button onclick="window.dismissPWA()" style="background:#2a2a3e;border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:12px;color:#a0a0b8;width:100%">Entendido</button>'
      +'</div>';
  }
};

window.dismissPWA = function(){
  localStorage.setItem('pwa-dismissed','1');
  var b = document.getElementById('pwa-btn'); if(b) b.remove();
};
</script>

</body></html>
