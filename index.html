const CFG_KEY = 'emb_sb_v1';
let _CFG = null; // {url, key}

function loadCfg() {
  try {
    if (location.hash && location.hash.length > 2) {
      const d = JSON.parse(atob(location.hash.slice(1)));
      if (d.url && d.key) { localStorage.setItem(CFG_KEY, JSON.stringify(d)); return d; }
    }
  } catch(e) {}
  try { return JSON.parse(localStorage.getItem(CFG_KEY)) || null; } catch { return null; }
}
function saveCfg(c) { localStorage.setItem(CFG_KEY, JSON.stringify(c)); }
function getShareLink(c) {

  return 'https://dreamy-meringue-dcc06f.netlify.app/';

// Pure REST DB layer — no SDK, no postMessage, no DataCloneError
function _errMsg(e) {
  if (!e) return 'Error desconocido';
  if (typeof e === 'string') return e;
  return e.message || e.details || e.hint || JSON.stringify(e);
}
function _plain(x) {
  if (x == null) return x;
  return JSON.parse(JSON.stringify(x));
}
function _h() {
  var k = _CFG.key;
  return {
    'Content-Type': 'application/json',
    'apikey': k,
    'Authorization': 'Bearer ' + k
  };
}
function _base() { return _CFG.url + '/rest/v1'; }
async function _req(method, path, body) {
  var opts = { method: method, headers: Object.assign({}, _h()) };
  if (method === 'POST' || method === 'PATCH') {
    opts.headers['Prefer'] = 'resolution=merge-duplicates,return=minimal';
  }
  if (body != null) opts.body = JSON.stringify(body);
  var res = await fetch(_base() + path, opts);
  var txt = await res.text();
  if (!res.ok) {
    var msg = 'HTTP ' + res.status;
    try { var j = JSON.parse(txt); msg = j.message || j.details || j.hint || msg; } catch(e) {}
    throw new Error(msg);
  }
  if (!txt) return null;
  try { return JSON.parse(txt); } catch(e) { return null; }
}
async function getAll(table) {
  var r = await _req('GET', '/' + table + '?select=*');
  return _plain(r) || [];
}
async function getOne(table, id) {
  var r = await _req('GET', '/' + table + '?select=*&id=eq.' + encodeURIComponent(id));
  var rows = _plain(r);
  return (rows && rows.length) ? rows[0] : null;
}
async function upsertRow(table, row) {
  await _req('POST', '/' + table, _plain(row));
}
async function delRow(table, id) {
  await _req('DELETE', '/' + table + '?id=eq.' + encodeURIComponent(id), null);
}
async function delWhere(table, col, val) {
  await _req('DELETE', '/' + table + '?' + col + '=eq.' + encodeURIComponent(val), null);
}

let ME = null;
try { ME = JSON.parse(sessionStorage.getItem('emb_me')) || null; } catch(e) {}
async function loginAsync(u, p) {
  u = u.trim();
  if (!u) return {ok:false, msg:'Ingresá tu nombre'};
  // Admin check
  if (u === 'emabol' && p === 'emabol') {
    const m = {n:'emabol', admin:true, jid:null};
    ME = m; sessionStorage.setItem('emb_me', JSON.stringify(m)); return {ok:true};
  }
  // Player: search in DB (case-insensitive)
  const all = await getAll('jugadores');
  const found = all.find(j => j.nombre.toLowerCase() === u.toLowerCase());
  if (!found) return {ok:false, msg:'No estás en la lista de jugadores. Pedile al admin que te agregue.'};
  const m = {n:found.nombre, admin:false, jid:found.id};
  ME = m; sessionStorage.setItem('emb_me', JSON.stringify(m)); return {ok:true};
}
function logout() { ME=null; sessionStorage.removeItem('emb_me'); }

  const S={sm:152,md:212,lg:280};const w=S[sz],h=Math.round(w*1.42);
  const pc=PC[j.pos]||'#f5c518',rc=RC(j.rating);
  const sts=Object.entries(j.stats||{});
  const fw=w*.22,fp=w*.10,fn=w*.090,fs=w*.085,fl=w*.058;
  const ph=j.foto?`<img src="${j.foto}" style="width:100%;height:100%;object-fit:cover"/>`:
    `<div style="width:100%;height:100%;background:linear-gradient(135deg,${pc}40,${pc}10);display:flex;align-items:center;justify-content:center;font-size:${w*.22}px">⚽</div>`;
  const sh=sts.map(([k,v])=>`<div style="display:flex;flex-direction:column;align-items:center"><span style="font-size:${fs}px;font-weight:900;color:${rc};font-family:'Barlow Condensed',sans-serif;line-height:1">${v}</span><span style="font-size:${fl}px;color:#a0a0b8;font-weight:700;font-family:'Barlow Condensed',sans-serif;margin-top:2px">${k}</span></div>`).join('');
  return`<div style="width:${w}px;height:${h}px;border-radius:14px;overflow:hidden;position:relative;flex-shrink:0;background:linear-gradient(135deg,#2a1e00,#1a1200,#0d0900);border:1.5px solid ${rc}70;box-shadow:0 0 28px ${pc}28,0 8px 28px #00000080">
  <div style="position:absolute;inset:0;height:50%;background:linear-gradient(180deg,${pc}44,transparent);pointer-events:none"></div>
  <div style="position:absolute;top:${h*.05}px;left:${w*.07}px;display:flex;flex-direction:column;align-items:center;z-index:10">
    <span style="font-size:${fw}px;font-weight:900;color:${rc};line-height:1;font-family:'Barlow Condensed',sans-serif;text-shadow:0 2px 6px #000">${j.rating}</span>
    <span style="font-size:${fp}px;font-weight:800;color:${rc};font-family:'Barlow Condensed',sans-serif;margin-top:-2px">${j.pos}</span>
    <div style="margin-top:4px;border:1px solid ${rc}80;border-radius:3px;padding:1px 3px"><span style="font-size:${fl*.85}px;color:${rc};font-weight:900;font-family:'Barlow Condensed',sans-serif">EMB</span></div>
  </div>
  <div style="position:absolute;top:${h*.04}px;right:${w*.03}px;width:${w*.58}px;height:${h*.52}px;border-radius:8px;overflow:hidden;z-index:5">
    ${ph}<div style="position:absolute;bottom:0;left:0;right:0;height:60%;background:linear-gradient(transparent,#1a1200);pointer-events:none"></div>
  </div>
  <div style="position:absolute;bottom:${h*.26}px;left:0;right:0;display:flex;flex-direction:column;align-items:center;z-index:10;padding:0 8px">
    <span style="font-size:${fn}px;font-weight:900;color:#fff;font-family:'Barlow Condensed',sans-serif;letter-spacing:2px;text-align:center;text-shadow:0 1px 6px #000;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(j.nombre||'').toUpperCase()}</span>
    <div style="height:2px;width:34px;background:${rc};border-radius:1px;margin-top:3px;opacity:.8"></div>
  </div>
  <div style="position:absolute;bottom:${h*.245}px;left:8%;right:8%;height:1px;background:${rc}50;z-index:8"></div>
  <div style="position:absolute;bottom:${h*.04}px;left:5%;right:5%;height:${h*.19}px;display:flex;align-items:center;justify-content:space-around;z-index:10">${sh}</div>
  </div>`;
}

// ═══════ ROUTER ═══════
let R='/login',RP={};

function setContent(html){document.getElementById('app').innerHTML=html+nav();}
function nav(){
  if(!ME||R==='/login'||R==='/setup')return'';
  const items=[
    {i:'🏠',l:'INICIO',p:'/home'},
    ...(ME&&ME.admin?[{i:'👥',l:'JUGADORES',p:'/players'}]:[]),
    {i:'🏆',l:'RANKING',p:'/ranking'},
    {i:'⚽',l:'PARTIDOS',p:'/match'},
    {i:'📋',l:'HISTORIAL',p:'/historial'},
  ];
  return`<nav class="nav">${items.map(x=>`<button class="ni${R===x.p||R.startsWith(x.p+'/')?' on':''}" onclick="go('${x.p}')"><span class="ni-ico">${x.i}</span>${x.l}</button>`).join('')}</nav>`;
}
window.go=function(p,params={}){
  if(!ME&&p!=='/login'&&p!=='/setup')p='/login';
  R=p;RP=params||{};
  render().catch(e=>{
    console.error('render error:',e);
    setContent('<div style="padding:40px;text-align:center;color:var(--red)">Error: '+e.message+'<br><br><button class="btn btn-gold" onclick="render()">Reintentar</button></div>');
  });
  window.scrollTo(0,0);
};
window.doLogout=function(){logout();go('/login');};

window.doSetup=async function(){
  var rawUrl=document.getElementById('s-url').value.trim().replace(/\/$/,'');
  var key=document.getElementById('s-key').value.trim();
  if(!rawUrl||!key){sSetup('Completá los dos campos.');return;}
  // Normalize URL
  var url=rawUrl;
  if(!url.startsWith('http'))url='https://'+url;
  _CFG = {url, key};
  saveCfg({url, key});
  setContent(loading('Verificando conexión...'));
  try {
    var _tr = await _req('GET', '/torneos?select=id&limit=1');
    setContent(loading('Inicializando datos...'));
    await seedData();
    go('/login');
  } catch(e) {
    sSetup('No se pudo conectar: ' + e.message);
  }
};

window.doLogin=async function(){
  const u=document.getElementById('lu').value.trim();
  const p=LM==='admin'?(document.getElementById('lp')||{value:''}).value:'';
  const e=document.getElementById('le');
  const btn=document.querySelector('.btn-gold');
  if(btn){btn.textContent='...';btn.disabled=true;}
  const res=await loginAsync(u,p);
  if(res.ok){go('/home');}
  else{
    e.textContent=res.msg||'Error al ingresar';e.style.display='block';
    if(btn){btn.textContent='INGRESAR';btn.disabled=false;}
    const w=document.querySelector('#app>div');if(w){w.style.animation='shake .4s ease';setTimeout(()=>w.style.animation='',500);}

};

// Autocomplete for player name
window._allPlayers=[];
async function loadPlayerNames(){
  if(window._allPlayers.length) return;
  try{ window._allPlayers=(await getAll('jugadores')).map(j=>j.nombre); }catch(e){}
}
window.onPlayerInput=function(val){
  loadPlayerNames();
  const box=document.getElementById('suggest-box');
  if(!box) return;
  if(!val||val.length<2){box.innerHTML='';box.style.display='none';return;}
  const matches=window._allPlayers.filter(n=>n.toLowerCase().includes(val.toLowerCase())).slice(0,5);
  if(!matches.length){box.innerHTML='';box.style.display='none';return;}
  box.innerHTML=matches.map(n=>`<div onclick="pickPlayer('${n.replace(/'/g,"\'")}')" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid #2a2a3e;font-size:13px;color:#fff;font-weight:700" onmouseover="this.style.background='#1a1a2e'" onmouseout="this.style.background='transparent'">${n}</div>`).join('');
  box.style.display='block';
};
window.pickPlayer=function(name){
  const inp=document.getElementById('lu');
  if(inp)inp.value=name;
  const box=document.getElementById('suggest-box');
  if(box){box.innerHTML='';box.style.display='none';}
};

// ═══════ HOME ═══════
async function sHome(){
  setContent(loading());
  const [js, ts, convs] = await Promise.all([
    getAll('jugadores').catch(()=>[]),
    getAll('torneos').catch(()=>[]),
    getAll('convocatorias').catch(()=>[])
  ]);
  const shareLink = getShareLink({url:_CFG.url, key:_CFG.key});

  function getNextConv(tid){
    return convs
      .filter(cv=>cv.tid===tid && diasHasta(cv.fecha)>=0)
      .sort((a,b)=>diasHasta(a.fecha)-diasHasta(b.fecha))[0]||null;
  }

  const matchCards = ts.map(t=>{
    const color = t.id==='t1'?'#00d4ff':'#c084fc';
    const bg    = t.id==='t1'?'linear-gradient(135deg,#001525 0%,#003050 100%)':'linear-gradient(135deg,#1a0030 0%,#2d004d 100%)';
    const conv  = getNextConv(t.id);
    const fecha = conv?conv.fecha:proximoPartido(t.id);
    const dias  = diasHasta(fecha);
    const convocados = conv?[...(conv.equipo_a||[]),...(conv.equipo_b||[])]:[];
    const yoConv = ME&&convocados.includes(ME.n);
    const quiere = ME&&(conv&&(conv.quieren_jugar||[]).includes(ME.n));

    // Badge estado
    let badge='';
    if(conv&&conv.estado==='confirmado')
      badge=`<span style="background:#00ff8820;border:1px solid #00ff88;color:#00ff88;padding:4px 12px;border-radius:999px;font-size:10px;font-weight:900;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px">✓ CONFIRMADO</span>`;
    else if(dias===0)
      badge=`<span style="background:${color}25;border:1px solid ${color};color:${color};padding:4px 12px;border-radius:999px;font-size:10px;font-weight:900;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px">🔴 HOY</span>`;
    else if(dias<=3)
      badge=`<span style="background:${color}20;border:1px solid ${color};color:${color};padding:4px 12px;border-radius:999px;font-size:10px;font-weight:900;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px">🟢 EN ${dias} DÍA${dias!==1?'S':''}</span>`;
    else
      badge=`<span style="background:#1a1a2e;border:1px solid #3a3a5e;color:var(--dim);padding:4px 12px;border-radius:999px;font-size:10px;font-weight:800;font-family:'Barlow Condensed',sans-serif">📅 EN ${dias} DÍAS</span>`;

    // Mi estado
    let myStatus='';
    if(yoConv)
      myStatus=`<div style="display:flex;align-items:center;gap:8px;background:#00ff8812;border:1px solid #00ff8835;border-radius:8px;padding:8px 12px;margin-top:10px"><span>✅</span><span style="font-size:12px;font-weight:800;color:#00ff88;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px">ESTÁS CONVOCADO</span></div>`;

      cta=`<button onclick="go('/convocatoria',{tid:'${t.id}'})" style="width:100%;margin-top:12px;padding:12px;border-radius:10px;cursor:pointer;border:1.5px solid ${color};background:${color}15;color:${color};font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;letter-spacing:1px">${conv&&conv.estado==='confirmado'?'👁 VER EQUIPOS':'⚽ GESTIONAR CONVOCATORIA'}</button>`;

  // Panel quick-access

// ═══════ RANKING ═══════
async function sRanking(p){
  setContent(loading('Cargando ranking...'));
  const[ts,allR,js]=await Promise.all([getAll('torneos'),getAll('ranking'),getAll('jugadores')]);
  const jMap={};js.forEach(j=>jMap[j.id]=j);

  // view: 'general' | torneo id
  const view = p.view || 'general';

  // Build unified totals per player
  const totals={};
  allR.forEach(e=>{
    if(!totals[e.jid]) totals[e.jid]={jid:e.jid,pts:0,g:0,c:0,f:0,t1:0,t2:0};
    totals[e.jid].pts += e.pts||0;
    totals[e.jid].g   += e.g||0;
    totals[e.jid].c   += e.c||0;
    totals[e.jid].f   += e.f||0;
    // per-torneo pts for breakdown
    totals[e.jid][e.tid] = (totals[e.jid][e.tid]||0) + (e.pts||0);
  });

  // Filter by torneo if not general
  let ranked;
  if(view==='general'){
    ranked = Object.values(totals).sort((a,b)=>b.pts-a.pts||b.g-a.g||b.f-a.f);
  } else {
    ranked = allR.filter(e=>e.tid===view).sort((a,b)=>b.pts-a.pts||(b.g||0)-(a.g||0));
  }

  // Tab buttons
  const tabs = [
    {id:'general', label:'🌐 GENERAL', color:'#f5c518'},
    ...ts.map(t=>({id:t.id, label:t.emoji+' '+t.dia, color:t.id==='t1'?'#00d4ff':'#ff69b4'}))
  ];

// Helper: parse fecha string 'DD/MM/YYYY' → Date
function parseFecha(f) {
  if(!f) return null;
  const p = f.split('/');
  return new Date(+p[2], +p[1]-1, +p[0]);
}
function fmtFecha(d) {
  if(!d) return '';
  return d.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
}
function diasHasta(fecha) {
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const d = parseFecha(fecha); if(!d) return 999;
  d.setHours(0,0,0,0);
  return Math.round((d-hoy)/(1000*60*60*24));
}

// Get next partido for each torneo
function proximoPartido(tid) {
  // t1=miércoles(3), t2=sábados(6)
  const diaSemana = tid==='t1' ? 3 : 6;
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const d = new Date(hoy);
  let diff = diaSemana - d.getDay();
  if(diff <= 0) diff += 7;
  d.setDate(d.getDate() + diff);
  return d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}).replace(/\//g,'/');
}

// Main screen: shows both torneos next match
async function sProximos() {
  setContent(loading('Cargando partidos...'));

    getAll('torneos').catch(()=>[]),
    getAll('jugadores').catch(()=>[]),
    getAll('convocatorias').catch(()=>[]),
    getAll('partidos').catch(()=>[])
  ]);

  // Generate full fixture for a torneo
  function getFixture(t) {
    const diaSemana = t.id==='t1' ? 3 : 6; // miércoles=3, sábado=6
    const [dIni, mIni, aIni] = t.ini.split('/').map(Number);
    const [dFin, mFin, aFin] = t.fin.split('/').map(Number);
    const start = new Date(aIni, mIni-1, dIni);
    const end   = new Date(aFin, mFin-1, dFin);
    const dates = [];
    // Find first match day on or after start
    const d = new Date(start);
    let diff = diaSemana - d.getDay();
    if (diff < 0) diff += 7;
    d.setDate(d.getDate() + diff);
    while (d <= end) {
      dates.push(d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}).replace(/\//g,'/'));
      d.setDate(d.getDate() + 7);
    }
    return dates;
  }

  function diasHastaFecha(f) {
    const [dd,mm,aa] = f.split('/').map(Number);
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    const target = new Date(aa, mm-1, dd);
    return Math.round((target - hoy) / 86400000);
  }

  function fmtFecha(f) {
    const [dd,mm,aa] = f.split('/').map(Number);
    const d = new Date(aa, mm-1, dd);
    const dias = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

async function sConvocatoria(p) {
  setContent(loading('Cargando...'));
  const [ts, allJs, convs, partidos] = await Promise.all([
    getAll('torneos').catch(()=>[]),
    getAll('jugadores').catch(()=>[]),
    getAll('convocatorias').catch(()=>[]),
    getAll('partidos').catch(()=>[])
  ]);
  const t = ts.find(x => x.id === (p.tid||'t1')) || ts[0];
  if (!t) { setContent('<div class="screen" style="padding:20px;color:var(--red)">No se encontró el torneo.</div>'); return; }

  // Use the fecha passed in (from fixture), or compute next
  const fecha = p.fecha || proximoPartido(t.id);

  // Find existing conv for this exact fecha, or create one
  let conv = convs.find(cv => cv.tid === t.id && cv.fecha === fecha);
  if (!conv) {
    // Auto-seed convocados from last partido played in this torneo
    const fixture = getFixture(t);
    const fidx = fixture.indexOf(fecha);
    let autoConv = [];
    if (fidx > 0) {
      // Look for partidos played in previous dates of this torneo
      const prevFechas = fixture.slice(0, fidx);
      const lastPartido = partidos
        .filter(p2 => p2.tid === t.id && prevFechas.includes(p2.fecha))
        .sort((a,b) => b.fecha.localeCompare(a.fecha))[0];
      if (lastPartido && lastPartido.conv) {
        // conv field in partido stores list of jugador ids that played
        autoConv = Array.isArray(lastPartido.conv) ? lastPartido.conv : [];
      }
    }
    conv = {
      id: uid(), tid: t.id, fecha, hora: '20:00',
      estado: 'borrador',
      equipo_a: [], equipo_b: [],
      equipo_a_nombre: 'AJAX', equipo_b_nombre: 'ROMA',
      quieren_jugar: [],
      // jugadores con sus estados: {jid, estado: 'convocado'|'no_convocado'|'confirmado'|'suspendido'}
      convocados_estado: autoConv.map(jid => ({jid, estado:'convocado'})),
      created_at: Date.now()
    };
    await upsertRow('convocatorias', conv);
  }
  // Migrate legacy: ensure convocados_estado exists
  if (!conv.convocados_estado) {
    const jugadosA = conv.equipo_a || [];
    const jugadosB = conv.equipo_b || [];
    const todos = [...new Set([...jugadosA, ...jugadosB])];
    conv.convocados_estado = todos.map(jid => ({jid, estado: conv.estado==='confirmado'?'confirmado':'convocado'}));
  }
  if (!conv.equipo_a_nombre) conv.equipo_a_nombre = 'AJAX';
  if (!conv.equipo_b_nombre) conv.equipo_b_nombre = 'ROMA';

  CV = JSON.parse(JSON.stringify(conv));
  CV._js = allJs;
  CV._t = t;
  CV._ro = p.ro || false; // readonly for non-admin confirmed view

  renderConv();
}

function getEstado(jid) {
  const e = (CV.convocados_estado||[]).find(x => x.jid===jid);
  return e ? e.estado : 'no_convocado';
}
function setEstado(jid, estado) {
  CV.convocados_estado = CV.convocados_estado || [];
  const idx = CV.convocados_estado.findIndex(x => x.jid===jid);
  if (idx >= 0) CV.convocados_estado[idx].estado = estado;
  else CV.convocados_estado.push({jid, estado});
  // Keep equipo_a / equipo_b in sync: only confirmados can be in a team
  if (estado !== 'confirmado') {
    CV.equipo_a = (CV.equipo_a||[]).filter(x => x!==jid);
    CV.equipo_b = (CV.equipo_b||[]).filter(x => x!==jid);
  }
}

function renderConv() {
  const t = CV._t, js = CV._js || [];
  const tcolor = t.id==='t1' ? '#00d4ff' : '#c084fc';
  const ta = CV.equipo_a_nombre || 'AJAX';
  const tb = CV.equipo_b_nombre || 'ROMA';
  const teamA = TEAMS[ta] || TEAMS['AJAX'];
  const teamB = TEAMS[tb] || TEAMS['ROMA'];
  const ea = CV.equipo_a || [];
  const eb = CV.equipo_b || [];
  const isAdmin = ME?.admin;
  const isConfirmado = CV.estado === 'confirmado';

  // All players sorted: convocados/confirmados first, then rest
  const estados = CV.convocados_estado || [];
  const getEst = jid => { const e = estados.find(x=>x.jid===jid); return e?e.estado:'no_convocado'; };

  const myEstado = ME && !isAdmin ? getEst(ME.jid) : null;

  // ── HEADER ──────────────────────────────────────────────────────────

      </div>
      <span style="padding:4px 12px;border-radius:999px;font-size:10px;font-weight:900;font-family:'Barlow Condensed',sans-serif;border:1px solid ${isConfirmado?'#00ff88':'#f5c518'};color:${isConfirmado?'#00ff88':'#f5c518'}">${CV.estado.toUpperCase()}</span>

        <p style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;color:#ff4444">ESTÁS SUSPENDIDO</p>

    } else if (myEstado === 'confirmado') {
      const dh = diasHasta(CV.fecha);

      myBlock = `<div style="background:#00ff8812;border:1px solid #00ff8840;border-radius:12px;padding:16px;text-align:center;margin-bottom:16px">

    } else if (myEstado === 'convocado') {

      <div style="width:30px;height:30px;border-radius:50%;background:${pc}25;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;color:${pc};font-family:'Barlow Condensed',sans-serif;overflow:hidden;flex-shrink:0">${j.foto?`<img src="${j.foto}" style="width:100%;height:100%;object-fit:cover"/>`:j.nombre[0]}</div>

  const canConfirm = !isConfirmado && ea.length===8 && eb.length===8;

  const confirmBtn = canConfirm

// ── Admin actions ────────────────────────────────────────────────────────────
window.adminSetEstado = async function(jid, estado) {
  setEstado(jid, estado);
  await saveConv();
  renderConv();
};

window.asignarEquipo = async function(jid, equipo) {
  const ea = CV.equipo_a||[], eb = CV.equipo_b||[];
  if (equipo==='a' && ea.length>=8) { alert('Equipo A ya tiene 8'); return; }
  if (equipo==='b' && eb.length>=8) { alert('Equipo B ya tiene 8'); return; }
  // Must be confirmado to be in a team
  setEstado(jid, 'confirmado');
  if (equipo==='a') CV.equipo_a = [...ea, jid];
  else CV.equipo_b = [...eb, jid];
  await saveConv();
  renderConv();
};

window.quitarDeEquipo = async function(jid) {
  CV.equipo_a = (CV.equipo_a||[]).filter(x=>x!==jid);
  CV.equipo_b = (CV.equipo_b||[]).filter(x=>x!==jid);
  // Keep as convocado (not remove entirely)
  setEstado(jid, 'convocado');
  await saveConv();
  renderConv();
};

window.setTeam = async function(slot, nombre) {
  if (slot==='a' && nombre===CV.equipo_b_nombre) { alert('Ese equipo ya está en el otro lado.'); return; }
  if (slot==='b' && nombre===CV.equipo_a_nombre) { alert('Ese equipo ya está en el otro lado.'); return; }
  if (slot==='a') CV.equipo_a_nombre = nombre;
  else CV.equipo_b_nombre = nombre;
  await saveConv();
  renderConv();
};

window.confirmarConvocatoria = async function() {
  if (!confirm('¿Confirmar el partido? Los jugadores verán los equipos.')) return;
  CV.estado = 'confirmado';
  await saveConv();
  setContent(`<div style="height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:linear-gradient(180deg,#05050f,#001a0a)">

// helper
function fmtFechaCorta(f) {
  if (!f) return '';
  const [dd,mm,aa] = f.split('/').map(Number);
  const d = new Date(aa, mm-1, dd);
  const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  return `${dias[d.getDay()]} ${dd} de ${meses[mm-1]}`;
}

function getFixture(t) {
  const diaSemana = t.id==='t1' ? 3 : 6;
  const [dIni,mIni,aIni] = t.ini.split('/').map(Number);
  const [dFin,mFin,aFin] = t.fin.split('/').map(Number);
  const start = new Date(aIni, mIni-1, dIni);
  const end   = new Date(aFin, mFin-1, dFin);
  const dates = [];
  const d = new Date(start);
  let diff = diaSemana - d.getDay();
  if (diff < 0) diff += 7;
  d.setDate(d.getDate() + diff);
  while (d <= end) {
    dates.push(d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}).replace(/\//g,'/'));
    d.setDate(d.getDate() + 7);
  }
  return dates;
}

  setContent(loading('Cargando historial...'));
  const [partidos, js, ts] = await Promise.all([getAll('partidos'), getAll('jugadores'), getAll('torneos')]);

  const tMap={}; ts.forEach(t=>tMap[t.id]=t);

  // Ordenar por fecha desc
  const sorted = [...partidos].sort((a,b)=>b.fecha.localeCompare(a.fecha));

  const rows = sorted.length===0
    ? `<div style="text-align:center;padding:48px 0;color:var(--dim)">
         <p style="font-size:40px;margin-bottom:10px">📋</p>
         <p style="font-size:14px">No hay partidos cargados aún.</p>
       </div>`
    : sorted.map(p=>{
        const t = tMap[p.tid];
        const color = p.tid==='t1'?'#00d4ff':'#c084fc';
        const conv = Array.isArray(p.conv)?p.conv:[];
        const fig  = p.fig ? jMap[p.fig] : null;
        const ganLabel = p.gan==='EMPATE'
          ? `<span style="color:#00ff88;font-weight:900;font-family:'Barlow Condensed',sans-serif;font-size:14px">EMPATE</span>`
          : `<span style="color:#f5c518;font-weight:900;font-family:'Barlow Condensed',sans-serif;font-size:14px">GANÓ EQUIPO ${p.gan}</span>`;
        const figHtml = fig
          ? `<p style="font-size:10px;color:#f5c518;margin-top:2px;font-family:'Barlow Condensed',sans-serif">⭐ FIGURA: ${fig.nombre}</p>`
          : '';
        const playerChips = conv.map(jid=>{
          const j=jMap[jid]; if(!j) return '';
          const pc = PC[j.pos]||'#888';
          return `<span style="padding:2px 7px;border-radius:999px;background:${pc}15;border:1px solid ${pc}40;font-size:9px;color:${pc};font-family:'Barlow Condensed',sans-serif;font-weight:700">${j.nombre}</span>`;
        }).join('');

        return `<div style="background:var(--card);border:1px solid ${color}30;border-radius:12px;padding:14px;margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
            <div>
              <p style="font-size:10px;color:${color};font-weight:800;letter-spacing:1.5px;font-family:'Barlow Condensed',sans-serif;margin-bottom:2px">${t?t.emoji+' '+t.nombre:'Torneo'}</p>
              <p style="font-size:15px;font-weight:900;color:#fff;font-family:'Barlow Condensed',sans-serif">${p.fecha}</p>
            </div>
            <div style="text-align:right">${ganLabel}${figHtml}</div>
          </div>
          ${conv.length?`<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:4px">${playerChips}</div>`:''}
        </div>`;
      }).join('');

  setContent(`<div class="screen up" style="padding:14px 15px 18px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
      <button class="bk" onclick="go('/home')">← VOLVER</button>
    </div>
    <p style="font-size:10px;color:#c084fc;font-weight:800;letter-spacing:3px;margin-bottom:3px">📋 REGISTRO</p>
    <h2 style="font-size:22px;font-family:'Barlow Condensed',sans-serif;margin-bottom:4px">HISTORIAL DE PARTIDOS</h2>
    <p style="font-size:12px;color:var(--dim);margin-bottom:14px">${sorted.length} partido${sorted.length!==1?'s':''} jugado${sorted.length!==1?'s':''}</p>
    ${rows}
  </div>`);
}

    "create table if not exists convocatorias (",

    "  tid text not null,",

    "  estado text not null default 'borrador',",

    "  equipo_b_nombre text not null default 'ROMA',",

    "alter table torneos enable row level security;",

    "do $$ begin if not exists (select 1 from pg_policies where policyname='pub_jugadores') then create policy pub_jugadores on jugadores for all using (true) with check (true); end if; end $$;",

    '</div>';
};

window.cpSQL = function() {
  var sql = window._sql || '';
  if (navigator.clipboard) {
    navigator.clipboard.writeText(sql).then(function() {
      var b = document.querySelector('[onclick="cpSQL()"]');
      if (b) { b.textContent = 'COPIADO!'; setTimeout(function(){ b.textContent = 'COPIAR SQL'; }, 2000); }
    }).catch(function(){ prompt('Copiá este SQL:', sql); });
  } else {
    prompt('Copiá este SQL:', sql);
  }
};
